<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="Styles.css">
    <title>Housing Report Saver</title>
  </head>
  <body>
    <h1>Housing Report Saver</h1>

    <div class="section-label">Listing info</div>
    <div class="address-zip-row">
      <div class="address-col">
        <label for="address-input">Address</label>
        <input
          type="text"
          id="address-input"
          placeholder="123 Main St, City, State"
        />
      </div>
      <div class="zip-col">
        <label for="zip-input">ZIP</label>
        <input
          type="text"
          id="zip-input"
          placeholder="e.g. 60601"
          maxlength="10"
          autocomplete="off"
        />
      </div>
    </div>

    <label for="apartment-input">Apartment / unit <span class="optional-tag">(optional)</span></label>
    <input
      type="text"
      id="apartment-input"
      placeholder="e.g. 4B"
      autocomplete="off"
    />

    <label for="description-input">Description / Notes</label>
    <textarea
      id="description-input"
      placeholder="Listing description or your notes about this place..."
    ></textarea>

    <div class="section-label section-label--spaced">Accessibility filters</div>

    <div class="filter-category">
      <div class="filter-category-title">Visual impairment</div>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="vi_wellLit" />
        Well-lit
      </label>
      <details class="filter-dropdown">
        <summary>Braille</summary>
        <div class="dropdown-checkboxes">
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="vi_braille_commonAreas" />
            Only common areas
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="vi_braille_everywhere" />
            Everywhere
          </label>
        </div>
      </details>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="vi_colorContrastedElectrical" />
        Color-contrasted electrical
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="vi_audibleApplianceIndicators" />
        Audible indicators for appliances
      </label>
    </div>

    <div class="filter-category">
      <div class="filter-category-title">Mobility</div>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="mob_noStairs" />
        No stairs
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="mob_minimalStairs" />
        Minimal stairs
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="mob_firstOrSingleFloor" />
        First floor / single floor
      </label>
      <details class="filter-dropdown">
        <summary>Elevator accessible</summary>
        <div class="dropdown-checkboxes">
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_elevator_1" />
            1 elevator
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_elevator_2" />
            2 elevators
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_elevator_3plus" />
            3+ elevators
          </label>
        </div>
      </details>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="mob_wideDoorways36to42" />
        Wide doorways (approx. 36–42 in.)
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="mob_stairLift" />
        Stair lift
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="mob_rollInShower" />
        Roll-in showers
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="mob_showerWithSeat" />
        Shower with seat
      </label>
      <details class="filter-dropdown">
        <summary>Grab bars</summary>
        <div class="dropdown-checkboxes">
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_grabBars_kitchen" />
            Kitchen
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_grabBars_stairways" />
            Stairways
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_grabBars_other" />
            Other
          </label>
        </div>
      </details>
      <details class="filter-dropdown">
        <summary>Lowered countertops (approx. 30–34 in.)</summary>
        <div class="dropdown-checkboxes">
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_loweredCounters_kitchen" />
            Kitchen
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_loweredCounters_bathroom" />
            Bathroom
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_loweredCounters_other" />
            Other
          </label>
        </div>
      </details>
      <details class="filter-dropdown">
        <summary>Roll-under sinks</summary>
        <div class="dropdown-checkboxes">
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_rollUnderSinks_kitchen" />
            Kitchen
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_rollUnderSinks_bathroom" />
            Bathroom
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_rollUnderSinks_other" />
            Other
          </label>
        </div>
      </details>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="mob_frontFacingApplianceControls" />
        Appliances with front-facing controls
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="mob_leverDoorHandles" />
        Lever door handles
      </label>
      <details class="filter-dropdown">
        <summary>Light switches</summary>
        <div class="dropdown-checkboxes">
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_lightSwitch_regular" />
            Switch-type (regular)
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_lightSwitch_rocker" />
            Rocker-type (flat)
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_lightSwitch_automatic" />
            Automatic
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="mob_lightSwitch_other" />
            Other
          </label>
        </div>
      </details>
    </div>

    <div class="filter-category">
      <div class="filter-category-title">Hearing impairment</div>
      <details class="filter-dropdown">
        <summary>Strobe-light alarms</summary>
        <div class="dropdown-checkboxes">
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="hi_strobe_fireAlarms" />
            Fire alarms
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="hi_strobe_smokeDetectors" />
            Smoke detectors
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="accessibility-checkbox" value="hi_strobe_doorbells" />
            Doorbells
          </label>
        </div>
      </details>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="hi_visualApplianceIndicators" />
        Visual indicators for appliances
      </label>
    </div>

    <div class="filter-category">
      <div class="filter-category-title">Cognitive &amp; disabilities</div>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="cog_easyToNavigate" />
        Easy to navigate
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="cog_dimmableLightingSoundproofing" />
        Dimmable lighting &amp; soundproofing (e.g., thick carpets or insulation)
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="cog_stoveAutoShutoff" />
        Automatic shut-off on stove
      </label>
    </div>

    <div class="filter-category">
      <div class="filter-category-title">Other</div>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="oth_highPowerOutlets" />
        High-power load electrical outlets
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="oth_dedicatedStorage" />
        Dedicated storage space
      </label>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="oth_hardwoodOrLaminate" />
        Hardwood or laminate flooring
      </label>
    </div>
    <div class="filter-category">
      <div class="filter-category-title">Flag</div>
      <label class="checkbox-item filter-row">
        <input type="checkbox" class="accessibility-checkbox" value="note_flag" />
        Flagged
      </label>
      <textarea
        id="flag-input"
        placeholder="Why did you flag this report?"
      ></textarea>
    </div>

    <div class="buttons">
      <button id="save-btn" type="button">Save report</button>
      <button id="load-btn" type="button">Find report</button>
    </div>

    <div class="status" id="status"></div>
    <div class="meta" id="meta"></div>
    <div id="report-history"></div>

    <script src="popup.bundle.js"></script>
  </body>
</html>
